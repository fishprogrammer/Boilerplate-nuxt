services:

  app:
    build:
      context: .
      target: runner
      args:
        NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-https://api.store.a4j.ir}
        NUXT_PUBLIC_API_TIMEOUT: ${NUXT_PUBLIC_API_TIMEOUT:-30000}
        NUXT_PUBLIC_APP_TITLE: ${NUXT_PUBLIC_APP_TITLE:-My App}
        NUXT_PUBLIC_APP_NAME: ${NUXT_PUBLIC_APP_NAME:-My App}
        NUXT_PUBLIC_APP_DESCRIPTION: ${NUXT_PUBLIC_APP_DESCRIPTION:-An admin dashboard}
        NUXT_PUBLIC_APP_VERSION: ${NUXT_PUBLIC_APP_VERSION:-1.0.1}
        NUXT_PUBLIC_APP_THEME_COLOR: ${NUXT_PUBLIC_APP_THEME_COLOR:-#00B894}
        NUXT_PUBLIC_APP_BG_COLOR: ${NUXT_PUBLIC_APP_BG_COLOR:-#f4f5f6}
        NUXT_PUBLIC_APP_STORAGE_PREFIX: ${NUXT_PUBLIC_APP_STORAGE_PREFIX:-app}
    image: boilerplate-nuxt-app:latest
    container_name: boilerplate-nuxt-app
    ports:
      - "${APP_PORT:-80}:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  app-dev:
    image: node:22-alpine
    container_name: boilerplate-nuxt-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${DEV_PORT:-3000}:3000"
    environment:
      - NUXT_PUBLIC_API_BASE_URL=${NUXT_PUBLIC_API_BASE_URL:-}
      - NUXT_PUBLIC_API_PROXY_TARGET=${NUXT_PUBLIC_API_PROXY_TARGET:-https://api.store.a4j.ir}
      - NUXT_PUBLIC_API_TIMEOUT=${NUXT_PUBLIC_API_TIMEOUT:-30000}
      - NUXT_PUBLIC_APP_TITLE=${NUXT_PUBLIC_APP_TITLE:-My App}
      - NUXT_PUBLIC_APP_NAME=${NUXT_PUBLIC_APP_NAME:-My App}
      - NUXT_PUBLIC_APP_DESCRIPTION=${NUXT_PUBLIC_APP_DESCRIPTION:-}
      - NUXT_PUBLIC_APP_VERSION=${NUXT_PUBLIC_APP_VERSION:-1.0.1}
      - NUXT_PUBLIC_APP_THEME_COLOR=${NUXT_PUBLIC_APP_THEME_COLOR:-#00B894}
      - NUXT_PUBLIC_APP_BG_COLOR=${NUXT_PUBLIC_APP_BG_COLOR:-#f4f5f6}
      - NUXT_PUBLIC_APP_STORAGE_PREFIX=${NUXT_PUBLIC_APP_STORAGE_PREFIX:-app}
    command: sh -c "yarn install --frozen-lockfile && yarn dev --host 0.0.0.0"
    stdin_open: true
    tty: true
